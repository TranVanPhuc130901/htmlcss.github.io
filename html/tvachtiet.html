        </div>

            <i class="fas fa-chevron-right"></i>
        </div>
    </div>
</body>
<script>
var images = document.querySelectorAll(".thuvienanh__item img");
var warrap = document.querySelector(".warrap");
var close = document.querySelector(".close");
var pre = document.querySelector(".pre");
var next = document.querySelector(".next");
var wrapimg = document.querySelector(".warrap__inner img");


var current = 0;

function showImg(){
    if(current == 0){
        pre.classList.add("hide");
    } else {
        pre.classList.remove("hide");
    }

    if(current == images.length - 1){
        next.classList.add("hide");
    } else {
        next.classList.remove("hide");
    }

    wrapimg.src = images[current].src;
    warrap.classList.add("show");



}
images.forEach((item, index) => {
    item.addEventListener('click', function(){
        current = index;
       showImg();
    })
})

close.addEventListener('click', function(){
    warrap.classList.remove("show");
})


pre.addEventListener('click', function(){
    if(current > 0){
        current--;
        showImg();
    }
})

next.addEventListener('click', function(){
    if(current < images.length - 1){
        current++;
        showImg();
    }
})
</script>
